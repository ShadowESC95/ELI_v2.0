[pytest]
# ── ELI MKXI Test Configuration ──────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show each test name and outcome
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Custom markers
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    gpu: tests requiring a real GPU / model file
    gui: tests requiring PyQt6 display (set DISPLAY or run headless)
    integration: cross-layer integration tests

# Minimum pytest version
minversion = 7.0

# Timeout (requires pytest-timeout)
# timeout = 30
